services:
  banana-pro-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banana-pro-ui
    ports:
      - "${BANANA_PRO_PORT:-8787}:${BANANA_PRO_PORT:-8787}"
    environment:
      BANANA_PRO_API_KEY: ${BANANA_PRO_API_KEY}
      BANANA_PRO_LLM_API_KEY: ${BANANA_PRO_LLM_API_KEY:-}
      BANANA_PRO_API_URL: ${BANANA_PRO_API_URL:-https://api.apiyi.com/v1beta/models/gemini-3-pro-image-preview:generateContent}
      BANANA_PRO_UI_PASSWORD: ${BANANA_PRO_UI_PASSWORD:-}
      BANANA_PRO_HOST: ${BANANA_PRO_HOST:-0.0.0.0}
      BANANA_PRO_PORT: ${BANANA_PRO_PORT:-8787}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
