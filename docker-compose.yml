services:
  banana-pro-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banana-pro-ui
    ports:
      - "${BANANA_PRO_PORT:-8787}:${BANANA_PRO_PORT:-8787}"
    environment:
      BANANA_PRO_API_KEY: ${BANANA_PRO_API_KEY}
      BANANA_PRO_LLM_API_KEY: ${BANANA_PRO_LLM_API_KEY:-}
      BANANA_PRO_LLM_API_URL: ${BANANA_PRO_LLM_API_URL:-https://api.apiyi.com/v1/chat/completions}
      BANANA_PRO_API_URL: ${BANANA_PRO_API_URL:-https://api.apiyi.com/v1beta/models/gemini-3-pro-image-preview:generateContent}
      BANANA_PRO_UI_PASSWORD: ${BANANA_PRO_UI_PASSWORD:-}
      BANANA_PRO_HOST: ${BANANA_PRO_HOST:-0.0.0.0}
      BANANA_PRO_PORT: ${BANANA_PRO_PORT:-8787}
      BANANA_PRO_OSS_ENABLED: ${BANANA_PRO_OSS_ENABLED:-false}
      BANANA_PRO_OSS_ENDPOINT: ${BANANA_PRO_OSS_ENDPOINT:-oss-cn-hangzhou.aliyuncs.com}
      BANANA_PRO_OSS_BUCKET: ${BANANA_PRO_OSS_BUCKET:-}
      BANANA_PRO_OSS_ACCESS_KEY_ID: ${BANANA_PRO_OSS_ACCESS_KEY_ID:-}
      BANANA_PRO_OSS_ACCESS_KEY_SECRET: ${BANANA_PRO_OSS_ACCESS_KEY_SECRET:-}
      BANANA_PRO_OSS_PREFIX: ${BANANA_PRO_OSS_PREFIX:-banana-pro}
      BANANA_PRO_OSS_PUBLIC_BASE_URL: ${BANANA_PRO_OSS_PUBLIC_BASE_URL:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
