name: BananaLab
options:
  bundleIdPrefix: com.bananalab
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: BananaLab
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  BananaLab:
    type: application
    platform: iOS
    sources:
      - path: BananaLab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bananalab.BananaLab
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: BananaLab
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: BananaLab needs access to your photo library to pick base and reference images.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: BananaLab needs access to save generated images to your photo library.
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: YES
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        INFOPLIST_KEY_LSRequiresIPhoneOS: YES
    scheme:
      testTargets: []
